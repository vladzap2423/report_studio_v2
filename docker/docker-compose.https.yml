services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: report_studio_app
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ""
      PG_HOST: host.docker.internal
    volumes:
      - ../deploy-data/storage:/data/storage
      - ../deploy-data/reports:/data/reports
      - ../deploy-data/report-runs:/data/report-runs

  https_proxy:
    image: nginx:1.27-alpine
    container_name: report_studio_https
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${APP_PORT:-3000}:443"
    volumes:
      - ./nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
